name: Build and deploy ASP.Net Core app to Azure Web App - schink

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master

  workflow_dispatch:

  schedule:
    # 00:00 UTC = 02:00 South Africa time
    - cron: '0 0 * * *'

env:
  AZURE_WEBAPP_NAME: schink
  DOTNET_VERSION: '10.0.201'
  PROJECT_PATH: Shink/Shink.csproj
  PUBLISH_DIR: ./publish
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  NUGET_XMLDOC_MODE: skip

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: Shink/Shink.csproj

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }} -m

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore -m -p:RunAnalyzers=false

  publish:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: Shink/Shink.csproj

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }} -m

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release --no-restore -m -p:RunAnalyzers=false -o ${{ env.PUBLISH_DIR }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_382E49E8F4F44C09B8B1643442569987 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B343151D44E14C93ABB87BAEB6C36BA8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_527F5D2CBC94404AB0EB40F3F327EF21 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
