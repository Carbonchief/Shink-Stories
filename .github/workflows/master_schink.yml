name: Build and deploy ASP.Net Core app to Azure Web App - schink

on:
  push:
    branches:
      - master

  workflow_dispatch:

  schedule:
    # 00:00 UTC = 02:00 South Africa time
    - cron: '0 0 * * *'

env:
  AZURE_WEBAPP_NAME: schink
  DOTNET_VERSION: '10.x'
  PROJECT_PATH: Shink/Shink.csproj
  PUBLISH_DIR: ./publish

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release --no-restore -o ${{ env.PUBLISH_DIR }}

      - name: Upload artifact
        if: github.event_name != 'push'
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    # Deploy only for scheduled runs or manual runs
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_382E49E8F4F44C09B8B1643442569987 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B343151D44E14C93ABB87BAEB6C36BA8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_527F5D2CBC94404AB0EB40F3F327EF21 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish
