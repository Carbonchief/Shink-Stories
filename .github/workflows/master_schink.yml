name: Build and deploy ASP.Net Core app to Azure Web App - schink

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master

  workflow_dispatch:

  schedule:
    # 00:00 UTC = 02:00 South Africa time
    - cron: '0 0 * * *'

env:
  AZURE_WEBAPP_NAME: schink
  DOTNET_VERSION: '10.0.201'
  PROJECT_PATH: Shink/Shink.csproj
  PUBLISH_DIR: ./publish
  SUPABASE_PROJECT_REF: btpsoyiyhtfbeznonygn
  SUPABASE_WORKDIR: Shink/Database
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  NUGET_XMLDOC_MODE: skip
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: Shink/Shink.csproj

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }} -m

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore -m -p:RunAnalyzers=false

  publish:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@v5

      - name: Check whether publish is needed
        id: publish_check
        uses: actions/github-script@v8
        with:
          script: |
            const relevantPrefixes = [
              'Shink/',
              'Directory.Build.props',
              'Directory.Build.targets',
              'global.json',
              'Shink/Shink.csproj',
            ];

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'master_schink.yml',
              branch: 'master',
              status: 'completed',
              per_page: 100,
            });

            const latestPublishRun = runs
              .filter((run) => ['schedule', 'workflow_dispatch'].includes(run.event) && run.conclusion === 'success')
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

            if (!latestPublishRun) {
              core.setOutput('should_publish', 'true');
              core.setOutput('migration_files', '');
              core.setOutput('reason', 'no previous successful publish run');
              return;
            }

            if (latestPublishRun.head_sha === context.sha) {
              core.setOutput('should_publish', 'false');
              core.setOutput('migration_files', '');
              core.setOutput('reason', 'same commit already published');
              return;
            }

            const compare = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: latestPublishRun.head_sha,
              head: context.sha,
            });

            const changedFiles = compare.data.files?.map((file) => file.filename) ?? [];
            const hasRelevantChanges = changedFiles.some((file) =>
              relevantPrefixes.some((prefix) => file === prefix || file.startsWith(prefix))
            );
            const migrationFiles = changedFiles
              .filter((file) => file.startsWith('Shink/Database/migrations/') && file.endsWith('.sql'))
              .sort();

            core.setOutput('should_publish', hasRelevantChanges ? 'true' : 'false');
            core.setOutput('migration_files', migrationFiles.join('\n'));
            core.setOutput(
              'reason',
              hasRelevantChanges ? 'relevant files changed since last publish' : 'no relevant files changed since last publish'
            );

      - name: Stop when publish is not needed
        if: steps.publish_check.outputs.should_publish != 'true'
        run: |
          echo "Skipping publish: ${{ steps.publish_check.outputs.reason }}"

      - name: Set up .NET
        if: steps.publish_check.outputs.should_publish == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: Shink/Shink.csproj

      - name: Restore
        if: steps.publish_check.outputs.should_publish == 'true'
        run: dotnet restore ${{ env.PROJECT_PATH }} -m

      - name: Publish
        if: steps.publish_check.outputs.should_publish == 'true'
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release --no-restore -m -p:RunAnalyzers=false -o ${{ env.PUBLISH_DIR }}

      - name: Set up Supabase CLI
        if: steps.publish_check.outputs.should_publish == 'true' && steps.publish_check.outputs.migration_files != ''
        uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Validate Supabase secrets
        if: steps.publish_check.outputs.should_publish == 'true' && steps.publish_check.outputs.migration_files != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Missing GitHub secret SUPABASE_ACCESS_TOKEN."
            exit 1
          fi

      - name: Link Supabase project
        if: steps.publish_check.outputs.should_publish == 'true' && steps.publish_check.outputs.migration_files != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase --workdir ${{ env.SUPABASE_WORKDIR }} link --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Run Supabase migrations
        if: steps.publish_check.outputs.should_publish == 'true' && steps.publish_check.outputs.migration_files != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          MIGRATION_FILES: ${{ steps.publish_check.outputs.migration_files }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          supabase --workdir "${{ env.SUPABASE_WORKDIR }}" db query --linked \
            "create schema if not exists supabase_migrations;
            create table if not exists supabase_migrations.shink_action_migrations (
              file_name text primary key,
              github_sha text not null,
              applied_at timestamptz not null default now()
            );"

          while IFS= read -r migration_file; do
            if [ -z "$migration_file" ]; then
              continue
            fi

            migration_name="$(basename "$migration_file")"
            migration_name_sql="${migration_name//\'/\'\'}"
            already_applied="$(
              supabase --workdir "${{ env.SUPABASE_WORKDIR }}" db query --linked --output csv \
                "select exists(select 1 from supabase_migrations.shink_action_migrations where file_name = '$migration_name_sql');" |
              tail -n 1 |
              tr -d '\r'
            )"

            if [ "$already_applied" = "true" ]; then
              echo "Skipping previously applied migration: $migration_name"
              continue
            fi

            echo "Applying Supabase migration: $migration_name"
            supabase --workdir "${{ env.SUPABASE_WORKDIR }}" db query --linked --file "$migration_file"
            supabase --workdir "${{ env.SUPABASE_WORKDIR }}" db query --linked \
              "insert into supabase_migrations.shink_action_migrations(file_name, github_sha) values ('$migration_name_sql', '$GITHUB_SHA');"
          done <<< "$MIGRATION_FILES"

      - name: Login to Azure
        if: steps.publish_check.outputs.should_publish == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_382E49E8F4F44C09B8B1643442569987 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B343151D44E14C93ABB87BAEB6C36BA8 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_527F5D2CBC94404AB0EB40F3F327EF21 }}

      - name: Deploy to Azure Web App
        if: steps.publish_check.outputs.should_publish == 'true'
        uses: azure/webapps-deploy@v3
        env:
          # azure/webapps-deploy currently emits Node deprecation noise from bundled dependencies.
          NODE_OPTIONS: --no-deprecation
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ${{ env.PUBLISH_DIR }}
